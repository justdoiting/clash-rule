mixed-port: 7890
tcp-concurrent: true
allow-lan: true
ipv6: false
log-level: info
unified-delay: true
find-process-mode: strict

geodata-mode: true
geox-url:
  geoip: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/geoip.dat
  geosite: https://github.com/Loyalsoldier/domain-list-custom/releases/latest/download/geosite.dat
  mmdb: https://raw.githubusercontent.com/alecthw/mmdb_china_ip_list/release/Country.mmdb
  asn: https://github.com/mojolabs-id/GeoLite2-Database/releases/latest/download/GeoLite2-ASN.mmdb

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: ['+.lan', '+.local', 'rule-set:CNSITE']
  listen: 0.0.0.0:1053
  default-nameserver: [119.29.29.29, 223.5.5.5]
  nameserver: [119.29.29.29, tls://1.1.1.1, 1.2.4.8]
  nameserver-policy:
    'rule-set:CNPro': [119.29.29.29, 52.80.66.66, 101.226.4.6]
    'rule-set:CNSITE': [52.80.66.66, 101.226.4.6, 223.5.5.5]
    'rule-set:Proxy': [1.1.1.1, 8.8.8.8, 9.9.9.9, 64.6.64.6]

sniffer: { enable: true, sniff: { HTTP: { ports: [80], override-destination: true }, TLS: { ports: [443, 8443] }, QUIC: { ports: [443, 8443] } } }

tun:
  enable: true
  stack: mixed
  dns-hijack: [any:53]

profile:
  store-selected: true
  store-fake-ip: true

proxy-providers:

  自建节点:
    type: file
    path: ./jiedian.yaml
  
  公益节点:
    type: file
    path: ./free.yaml
  
zhixuan: &zhixuan 
   type: url-test
   url: https://www.google.com/generate_204
   include-all: true
   tolerance: 50
   interval: 600
   lazy: true

