guize: &guize
   type: http
   format: text
   interval: 86400
   behavior: classical

rule-providers:
    Other:
      type: file
      format: text
      behavior: classical
      path: ./rules/Other.list

    BiliBili:
      <<: *guize
      url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/BiliBili/BiliBili.list
      path: /rules/BiliBili.list

    CNASN:
      <<: *guize
      url: https://raw.githubusercontent.com/Kwisma/ASN-List/refs/heads/main/country/CN/CN_ASN.list
      path: ./rules/CNASN.list

    YouTube:
      <<: *guize
      url: https://raw.githubusercontent.com/Repcz/Tool/refs/heads/X/mihomo/Rules/YouTube.list
      path: ./rules/YouTube.list

    TikTok:
      <<: *guize
      url: https://whatshub.top/rule/TikTok.list
      path: ./rules/TikTok.list

    Telegram:
      <<: *guize
      url: https://raw.githubusercontent.com/Repcz/Tool/refs/heads/X/mihomo/Rules/Telegram.list
      path: ./rules/Telegram.list

    Twitter:
      <<: *guize
      url: https://whatshub.top/rule/Twitter.list
      path: ./rules/Twitter.list

    AI:
      <<: *guize
      url: https://raw.githubusercontent.com/fmz200/wool_scripts/main/Loon/rule/AI.list
      path: ./rules/AI.list

    Lan:
      <<: *guize
      url: https://raw.githubusercontent.com/Repcz/Tool/refs/heads/X/mihomo/Rules/Lan.list
      path: ./rules/Lan.list
    
    CNSITE:
      type: http
      format: mrs
      behavior: domain
      url: https://static-file-global.353355.xyz/rules/cn-additional-list.mrs
      interval: 86400
      path: ./rules/CNSITE.mrs

    CNip:
      type: http
      format: mrs
      behavior: ipcidr
      url: https://github.com/Kwisma/ASN-List/raw/refs/heads/main/country/CN/CN_IP.mrs
      interval: 86400
      path: ./rules/CNip.mrs

    CNPro:
      type: http
      format: mrs
      behavior: domain
      url: https://github.com/Ryucmd/mihomo-rule/raw/refs/heads/main/Direct_Mihomo.mrs
      interval: 86400
      path: ./rules/CNPro.mrs

    Proxy:
      type: http
      format: mrs
      behavior: domain
      url: https://github.com/Ryucmd/mihomo-rule/raw/refs/heads/main/Proxy_Mihomo.mrs
      interval: 86400
      path: ./rules/Proxy.mrs

rules:
    - RULE-SET,Lan,DIRECT,no-resolve
    - AND,((DST-PORT,443),(NETWORK,UDP)),REJECT
    - DOMAIN-KEYWORD,doppiocdn,ST下载
    - DOMAIN-KEYWORD,sooplive,SOOP选择
    - RULE-SET,Other,杂七杂八
    - DOMAIN-KEYWORD,bigo,BIGO切换
    - DOMAIN-KEYWORD,cubetecn,BIGO切换
    - DOMAIN-KEYWORD,cubetvgame,BIGO切换
    - RULE-SET,AI,AI平台
    - RULE-SET,BiliBili,哔哩哔哩
    - RULE-SET,YouTube,YouTube
    - RULE-SET,Telegram,电报消息
    - RULE-SET,Twitter,推特消息
    - RULE-SET,TikTok,TikTok
    - RULE-SET,Proxy,外网选择
    - RULE-SET,CNSITE,DIRECT
    - RULE-SET,CNPro,DIRECT
    - RULE-SET,CNip,DIRECT
    - RULE-SET,CNASN,DIRECT
    - MATCH,漏网之鱼
