mixed-port: 7890
tcp-concurrent: false
allow-lan: true
ipv6: true
log-level: info
unified-delay: true
find-process-mode: strict

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: ['+.lan', '+.local', 'rule-set:CNSITE']
  listen: 0.0.0.0:1053
  default-nameserver: [119.29.29.29, 223.5.5.5]
  nameserver: [119.29.29.29, tls://1.1.1.1, 1.2.4.8]
  nameserver-policy:
    'rule-set:CNPro': [52.80.66.66, 101.226.4.6, 223.5.5.5]
    'rule-set:CNSITE': [119.29.29.29, 101.226.4.6, 52.80.66.66]
    'rule-set:Proxy': [1.1.1.1, 8.8.8.8, 9.9.9.9, 64.6.64.6]

sniffer: { enable: true, sniff: { HTTP: { ports: [80], override-destination: true }, TLS: { ports: [443, 8443] } } }

tun:
  enable: true
  stack: mixed
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  store-fake-ip: true

proxy-providers:
    
  机场订阅:
    type: http
    interval: 720
    url: #放你的机场订阅链接
    health-check:
      enable: true
      interval: 600
      timeout: 3000
      url: https://www.google.com/generate_204
      lazy: true
    path: ./sub.yaml
 
zhixuan: &zhixuan 
   type: url-test
   url: https://www.google.com/generate_204
   include-all: true
   interval: 600
   tolerance: 50
   lazy: true

proxy-groups:

